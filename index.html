<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Tracker v2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: transparent; /* Baseline transparent, JS overrides for Notion */
            font-family: 'Courier New', monospace;
            padding: 20px;
            transition: background 0.3s ease;
        }

        .progress-container {
            background-color: rgba(30, 30, 30, 0.95);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            transition: background-color 0.3s ease;
            position: relative;
        }

        body.light-mode .progress-container {
            background-color: rgba(240, 240, 240, 0.95);
        }

        .theme-toggle {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            border-color: rgba(255, 255, 255, 0.6);
            background-color: rgba(255, 255, 255, 0.1);
        }

        body.light-mode .theme-toggle {
            border-color: rgba(0, 0, 0, 0.3);
            color: black;
        }

        body.light-mode .theme-toggle:hover {
            border-color: rgba(0, 0, 0, 0.6);
            background-color: rgba(0, 0, 0, 0.1);
        }

        .progress-item {
            margin-bottom: 24px;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .progress-item:last-child {
            margin-bottom: 0;
        }

        .progress-label {
            font-size: 14px;
            color: white;
            font-weight: 600;
            min-width: 80px;
            text-align: right;
            transition: color 0.3s ease;
        }

        body.light-mode .progress-label {
            color: black;
        }

        .progress-bar-wrapper {
            flex: 1;
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            height: 32px;
            overflow: hidden;
            position: relative;
        }

        body.light-mode .progress-bar-wrapper {
            background-color: rgba(200, 200, 200, 0.4);
            border-color: rgba(100, 100, 100, 0.4);
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, rgba(239, 239, 239, 0.8), rgba(239, 239, 239, 1));
            border-radius: 8px;
            transition: width 0.6s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
        }

        body.light-mode .progress-bar-fill {
            background: linear-gradient(90deg, rgba(30, 30, 30, 0.9), rgba(30, 30, 30, 1));
        }

        .progress-percentage {
            font-size: 12px;
            color: white;
            font-weight: 700;
            margin-left: 12px;
            min-width: 50px;
            text-align: left;
            transition: color 0.3s ease;
        }

        body.light-mode .progress-percentage {
            color: black;
        }

        @media (max-width: 600px) {
            .progress-container {
                padding: 20px;
            }

            .progress-item {
                gap: 12px;
            }

            .progress-bar-wrapper {
                height: 28px;
            }

            .progress-label {
                font-size: 12px;
                min-width: 70px;
            }

            .progress-percentage {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="progress-container">
        <button class="theme-toggle" id="theme-toggle">🌙</button>
        <div class="progress-item">
            <div class="progress-label">Year:</div>
            <div class="progress-bar-wrapper">
                <div class="progress-bar-fill" id="year-progress"></div>
            </div>
            <div class="progress-percentage" id="year-text">0%</div>
        </div>

        <div class="progress-item">
            <div class="progress-label">Month:</div>
            <div class="progress-bar-wrapper">
                <div class="progress-bar-fill" id="month-progress"></div>
            </div>
            <div class="progress-percentage" id="month-text">0%</div>
        </div>

        <div class="progress-item">
            <div class="progress-label">Week:</div>
            <div class="progress-bar-wrapper">
                <div class="progress-bar-fill" id="week-progress"></div>
            </div>
            <div class="progress-percentage" id="week-text">0%</div>
        </div>

        <div class="progress-item">
            <div class="progress-label">Day:</div>
            <div class="progress-bar-wrapper">
                <div class="progress-bar-fill" id="day-progress"></div>
            </div>
            <div class="progress-percentage" id="day-text">0%</div>
        </div>
    </div>

    <script>
        function updateProgress() {
            const now = new Date();

            // Year progress (0-365 days)
            const yearStart = new Date(now.getFullYear(), 0, 1);
            const yearEnd = new Date(now.getFullYear() + 1, 0, 1);
            const yearProgress = ((now - yearStart) / (yearEnd - yearStart)) * 100;

            // Month progress (day of month / days in month)
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const monthProgress = (now.getDate() / daysInMonth) * 100;

            // Week progress (day of week / 7)
            const dayOfWeek = now.getDay();
            const weekProgress = ((dayOfWeek + 1) / 7) * 100;

            // Day progress (hours / 24)
            const dayProgress = ((now.getHours() + now.getMinutes() / 60) / 24) * 100;

            // Update bars and text
            updateBar('year-progress', 'year-text', yearProgress);
            updateBar('month-progress', 'month-text', monthProgress);
            updateBar('week-progress', 'week-text', weekProgress);
            updateBar('day-progress', 'day-text', dayProgress);
        }

        function updateBar(barId, textId, percentage) {
            const bar = document.getElementById(barId);
            const text = document.getElementById(textId);
            bar.style.width = percentage + '%';
            text.textContent = Math.round(percentage) + '%';
        }

        // Theme toggle
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        // Auto-detect system preference if no local storage is set
        const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
        const savedTheme = localStorage.getItem('theme') || (prefersLight ? 'light' : 'dark');
        
        if (savedTheme === 'light') {
            body.classList.add('light-mode');
            themeToggle.textContent = '☀️';
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            const isLight = body.classList.contains('light-mode');
            themeToggle.textContent = isLight ? '☀️' : '🌙';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');

            // Force Notion fix script to trigger on manual toggle
            if (typeof setBodyBackground === 'function') {
                setBodyBackground();
            }
        });

        // Initial update
        updateProgress();

        // Update every minute
        setInterval(updateProgress, 60000);

        // --- Notion Background Fix Script ---
        (function(){
            window.setBodyBackground = function() {
                try {
                    // Check if the light-mode class is currently applied
                    const isLight = document.body.classList.contains('light-mode');
                    document.body.style.background = isLight ? '#ffffff' : '#191919';
                } catch(e) {
                    document.body.style.background = '#ffffff';
                }
            };

            if(window.matchMedia){
                window.matchMedia('(prefers-color-scheme: dark)').addListener((e) => {
                    // Only auto-update if the user hasn't explicitly set a preference
                    if (!localStorage.getItem('theme')) {
                        if (e.matches) {
                            document.body.classList.remove('light-mode');
                            themeToggle.textContent = '🌙';
                        } else {
                            document.body.classList.add('light-mode');
                            themeToggle.textContent = '☀️';
                        }
                        setBodyBackground();
                    }
                });
            }
            setBodyBackground();
        })();
    </script>
</body>
</html>
